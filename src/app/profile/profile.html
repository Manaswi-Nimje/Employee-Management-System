<div class="profile-container">

  <div class="profile-box">

    <h2>Student Profile</h2>

    <!-- SEARCH BOX -->

<div class="search-box" *ngIf="!isDirectProfile">
      <input
      type="text"
      placeholder="Enter Student ID or Name"
      [(ngModel)]="searchText">

      <button (click)="searchStudent()">

        Search

      </button>

    </div>

    <!-- STUDENT CARD -->

    <div
    class="student-card"
    *ngIf="student">

      <h3>{{student.studname}}</h3>

      <p>
        <strong>ID :</strong>
        {{student.id}}
      </p>

      <p>
        <strong>Course :</strong>
        {{student.course}}
      </p>

      <p>
        <strong>Marks :</strong>
        {{student.marks}}
      </p>

      <p>
        <strong>Admission Date :</strong>
        {{student.admissionDate}}
      </p>

    </div>

  </div>

</div>
